<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Thank You | MD Khorshed Sheikh</title>
  <style>
    :root {
      --bg: #060810;
      --card: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f0f2f8;
      --muted: #9aa3bc;
      --accent: #e8314a;
      --accent-soft: rgba(232, 49, 74, 0.14);
      --font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(232, 49, 74, 0.16), transparent 34%),
        linear-gradient(180deg, #060810 0%, #0b0f1a 100%);
      color: var(--text);
      font-family: var(--font);
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(640px, 100%);
      padding: 44px 32px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: #ff7f90;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.1;
    }

    p {
      margin: 0 auto 28px;
      max-width: 52ch;
      color: var(--muted);
      line-height: 1.7;
      font-size: 1rem;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 180px;
      padding: 14px 20px;
      border-radius: 14px;
      background: var(--accent);
      color: white;
      text-decoration: none;
      font-weight: 700;
      box-shadow: 0 10px 30px rgba(232, 49, 74, 0.28);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 36px rgba(232, 49, 74, 0.34);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">Message received</div>
    <h1>Thank you for reaching out</h1>
    <p>Your message has been sent successfully. I’ll review it and get back to you as soon as possible.</p>
    <a href="/index.html">Back to portfolio</a>
  </main>
</body>
</html>
